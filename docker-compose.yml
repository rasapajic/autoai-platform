version: '3.9'

services:

  # ─── Baza podataka ───────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: autoai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d autoai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (cache + queue) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: autoai_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Elasticsearch (full-text pretraga) ───────────────────────
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: autoai_elastic
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoai_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://admin:${POSTGRES_PASSWORD:-secret123}@postgres:5432/autoai
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker (scraping taskovi) ────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoai_celery
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://admin:${POSTGRES_PASSWORD:-secret123}@postgres:5432/autoai
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  # ─── Celery Beat (scheduler) ──────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoai_beat
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://admin:${POSTGRES_PASSWORD:-secret123}@postgres:5432/autoai
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A app.core.celery_app beat --loglevel=info

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autoai_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

  # ─── Nginx (reverse proxy) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: autoai_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
  esdata:
